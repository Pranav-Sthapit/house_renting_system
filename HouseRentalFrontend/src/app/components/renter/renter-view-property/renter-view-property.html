<div class="page-header">
  <h2>Available Properties</h2>
</div>

<app-filter-component (filteredProperties)="loadFilteredProperties($event)"></app-filter-component>

<div class="property-grid">
  <div class="property-card" *ngFor="let p of properties">

    <div class="card-image">
      <img [src]="photoURL + p.thumbnail || 'assets/favicon.io'" alt="property" />
    </div>

    <div class="card-header">
      <h3>{{ p.locality }}, {{ p.city }}</h3>
      <span class="rent">₹ {{ p.rent }}</span>
    </div>

    <div class="card-body">
      <p><strong>BHK:</strong> {{ p.bhk }}</p>
      <p><strong>Furnishing:</strong> {{ p.furnishingStatus }}</p>
    </div>

    <div class="card-actions">
      <button class="btn" [routerLink]="['/renter-home/renter-property-details', p.id]">
        View Details
      </button>
    </div>

  </div>
</div>
